<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELSCAN</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --border: #d7dce5;
      --text: #1e2733;
      --subtle: #5b6878;
      --accent: #0f6bd8;
      --danger: #b42318;
      --ok: #05603a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #edf2ff 0%, var(--bg) 45%);
    }

    main {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 3px 10px rgba(20, 38, 66, 0.06);
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: #53627a;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      min-height: 18px;
      color: var(--subtle);
      font-size: 14px;
    }

    #status.error { color: var(--danger); }
    #status.ok { color: var(--ok); }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      background: #f1f4f9;
      border: 1px dashed #b8c3d4;
      border-radius: 10px;
      overflow: hidden;
    }

    #elsImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #imgCounter {
      margin-top: 10px;
      color: var(--subtle);
      font-size: 14px;
    }

    #questions {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 0;
      padding: 10px;
    }

    legend {
      font-weight: 700;
      padding: 0 6px;
      font-size: 14px;
    }

    .desc {
      margin: 0 0 8px;
      color: var(--subtle);
      font-size: 13px;
      white-space: pre-line;
    }

    .option {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin: 6px 0;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .top-row {
        grid-template-columns: 1fr;
      }
    }

    /* Login screen (Code 1 style) */
    #login-screen {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 9999;
      transition: opacity 0.5s ease;
      background: #0b1020;
      background: radial-gradient(circle at 50% 30%, #1a1440 0%, #0b1020 65%);
      color: #fff;
      font-family: "Inter", sans-serif;
    }

    #login-screen .bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 70% 60%, rgba(255, 70, 120, 0.15), transparent 50%),
        radial-gradient(circle at 30% 40%, rgba(0, 255, 200, 0.12), transparent 50%);
    }

    #login-screen .els {
      position: absolute;
      width: min(60vh, 650px);
      height: min(60vh, 650px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    #login-screen .cell {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
      transition: transform 2.5s cubic-bezier(.16, .8, .24, 1);
    }

    #login-screen .depth-back { opacity: 0.4; }
    #login-screen .depth-mid { opacity: 0.75; }
    #login-screen .depth-front { opacity: 1; }

    #login-screen .b {
      background: radial-gradient(circle at 30% 30%, #fff6b5 0%, #ffd84d 60%, #b89d20 100%);
    }

    #login-screen .t {
      background: radial-gradient(circle at 30% 30%, #ffb5b5 0%, #ff4d4d 60%, #8f1f1f 100%);
    }

    #login-screen .k {
      background: radial-gradient(circle at 30% 30%, #b5ffd6 0%, #4dff88 60%, #1c8f4d 100%);
    }

    #login-screen .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #login-screen .title {
      font-size: clamp(64px, 7vw, 110px);
      font-weight: 900;
      letter-spacing: 0.18em;
      background: linear-gradient(90deg, #00f0ff, #ff4d4d, #ffd84d, #00f0ff);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 10s linear infinite;
      opacity: 0;
      transform: translateY(20px);
      transition: 1s ease;
    }

    @keyframes gradientFlow {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    #login-screen .subtitle {
      font-family: "Playfair Display", serif;
      font-size: clamp(16px, 1.4vw, 20px);
      font-weight: 500;
      letter-spacing: 0.08em;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(15px);
      transition: 1s ease;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #login-screen .login {
      opacity: 0;
      transform: translateY(15px);
      transition: 1s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #login-screen .login input[type="text"] {
      width: 220px;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    #login-screen .login input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.75);
    }

    #login-screen .login button {
      padding: 14px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(45deg, #00f0ff, #ff4d4d);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      #login-screen .subtitle {
        white-space: normal;
        line-height: 1.4;
      }
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="bg"></div>
    <div class="els" id="els"></div>

    <div class="content" id="loginContent">
      <div class="title" id="loginTitle">ELSCAN</div>
      <div class="subtitle" id="loginSubtitle">Ectopic Lymphoid Structure Consensus Annotation Network</div>
      <div class="login" id="loginPanel">
        <input id="loginAnnotatorId" type="text" placeholder="Enter your name" />
        <button id="loginEnter" type="button">Enter</button>
      </div>
    </div>
  </div>

  <main>
    <h2>ELS Consensus Annotation</h2>

    <section class="card">
      <div class="top-row">
        <input id="annotatorId" type="text" placeholder="Annotator ID or Admin Token" />
        <button id="enterBtn" type="button">Enter</button>
        <button id="downloadBtn" class="secondary" type="button">Download CSV</button>
      </div>
      <div id="status" role="status"></div>
    </section>

    <section class="layout">
      <div class="card">
        <div class="image-wrap">
          <img id="elsImage" alt="ELS image" />
          <div id="emptyImageMsg">No image loaded</div>
        </div>
        <div id="imgCounter"></div>
      </div>

      <div class="card">
        <div id="questions"></div>
        <button id="submitBtn" type="button">Submit</button>
      </div>
    </section>
  </main>

  <!-- App logic inline (no dependency on external app.js path) -->
  <script>
    (() => {
      document.addEventListener("DOMContentLoaded", () => {
        let schema = null;
        let images = [];
        let idx = 0;

        const annotatorInput = document.getElementById("annotatorId");
        const submitBtn = document.getElementById("submitBtn");
        const enterBtn = document.getElementById("enterBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        const questionsEl = document.getElementById("questions");
        const imageEl = document.getElementById("elsImage");
        const counterEl = document.getElementById("imgCounter");
        const statusEl = document.getElementById("status");
        const emptyImageMsgEl = document.getElementById("emptyImageMsg");

        if (!annotatorInput || !submitBtn || !enterBtn || !downloadBtn || !questionsEl || !imageEl || !counterEl || !statusEl || !emptyImageMsgEl) {
          console.error("Missing required DOM elements for app initialization.");
          return;
        }

        const DISPLAY_QUESTION_TEXT = {
          cell_types_present: "Which cell types are present in the ELS? (You may select more than one option)",
          dominant_cell_population: "Which cell population appears to be the most abundant?",
          cell_density: "How dense are the cells inside the ELS?",
          b_t_separation: "How separated are the B-cell and T-cell areas?",
          t_cell_ring: "Is there a T-cell ring at the edge of the ELS?",
          gc_like_structure:
            "Is there a GC-like structure? (GC-like = a clearly localized cluster of proliferating cells (green, Ki67+) situated within or tightly surrounded by a B- or T-cell-rich area (yellow or red), not diffusely distributed across the entire ELS)"
        };

        function setStatus(message, kind = "") {
          statusEl.classList.remove("error", "ok");
          if (kind) statusEl.classList.add(kind);
          statusEl.textContent = message;
        }

        function renderQuestions() {
          questionsEl.innerHTML = "";

          for (const [key, config] of Object.entries(schema || {})) {
            const fieldset = document.createElement("fieldset");
            fieldset.className = "question";
            fieldset.dataset.key = key;
            fieldset.dataset.type = config.type;

            const legend = document.createElement("legend");
            legend.textContent = DISPLAY_QUESTION_TEXT[key] || key;
            fieldset.appendChild(legend);

            (config.options || []).forEach((option, optionIndex) => {
              const id = `q_${key}_${optionIndex}`;
              const label = document.createElement("label");
              label.className = "option";
              label.setAttribute("for", id);

              const input = document.createElement("input");
              input.id = id;
              input.name = `q_${key}`;
              input.value = option;
              input.type = config.type === "multi" ? "checkbox" : "radio";

              const text = document.createElement("span");
              text.textContent = option;

              label.appendChild(input);
              label.appendChild(text);
              fieldset.appendChild(label);
            });

            questionsEl.appendChild(fieldset);
          }
        }

        function renderImage() {
          if (!images.length) {
            imageEl.style.display = "none";
            emptyImageMsgEl.style.display = "block";
            emptyImageMsgEl.textContent = "No image loaded";
            counterEl.textContent = "No images found in /images";
            submitBtn.disabled = true;
            return;
          }

          if (idx >= images.length) {
            imageEl.style.display = "none";
            emptyImageMsgEl.style.display = "block";
            emptyImageMsgEl.textContent = "All images annotated";
            counterEl.textContent = `Completed ${images.length}/${images.length}`;
            submitBtn.disabled = true;
            return;
          }

          const name = images[idx];
          imageEl.src = `/images/${encodeURIComponent(name)}`;
          imageEl.style.display = "block";
          emptyImageMsgEl.style.display = "none";
          counterEl.textContent = `Image ${idx + 1}/${images.length}: ${name}`;
          submitBtn.disabled = false;
        }

        function collectAnswers() {
          const answers = {};
          const missingSingles = [];

          document.querySelectorAll("fieldset.question").forEach((fieldset) => {
            const key = fieldset.dataset.key;
            const type = fieldset.dataset.type;

            if (type === "single") {
              const selected = fieldset.querySelector('input[type="radio"]:checked');
              if (selected) answers[key] = selected.value;
              else missingSingles.push(key);
              return;
            }

            if (type === "multi") {
              const selected = Array.from(fieldset.querySelectorAll('input[type="checkbox"]:checked')).map((x) => x.value);
              answers[key] = selected;
            }
          });

          return { answers, missingSingles };
        }

        function clearForm() {
          questionsEl.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach((x) => {
            x.checked = false;
          });
        }

        async function initializeApp() {
          try {
            setStatus("Loading schema and images...");

            const [schemaResp, imagesResp] = await Promise.all([
              fetch("/schema", { cache: "no-store" }),
              fetch("/images-list", { cache: "no-store" }),
            ]);

            if (!schemaResp.ok) throw new Error(`Failed loading schema: ${schemaResp.status}`);
            if (!imagesResp.ok) throw new Error(`Failed loading images: ${imagesResp.status}`);

            schema = await schemaResp.json();
            images = await imagesResp.json();

            renderQuestions();
            renderImage();
            setStatus("Ready");
          } catch (error) {
            setStatus(error.message || "Initialization failed", "error");
            submitBtn.disabled = true;
          }
        }

        enterBtn.addEventListener("click", () => {
          const id = annotatorInput.value.trim();
          if (!id) {
            setStatus("Enter annotator ID first", "error");
            return;
          }
          setStatus("Annotator ID set", "ok");
        });

        downloadBtn.addEventListener("click", async () => {
          const token = annotatorInput.value.trim();
          if (!token) {
            setStatus("Enter admin token first", "error");
            return;
          }

          try {
            window.open(`/admin/export/annotations?token=${encodeURIComponent(token)}`, "_blank");
            setStatus("CSV download started", "ok");
          } catch (error) {
            setStatus(error.message || "Export failed", "error");
          }
        });

        submitBtn.addEventListener("click", async () => {
          if (!images.length || idx >= images.length) {
            setStatus("No images left to annotate", "error");
            return;
          }

          const annotatorId = annotatorInput.value.trim();
          if (!annotatorId) {
            setStatus("Annotator ID is required", "error");
            return;
          }

          const { answers, missingSingles } = collectAnswers();
          if (missingSingles.length) {
            setStatus(`Complete required single-choice questions: ${missingSingles.join(", ")}`, "error");
            return;
          }

          submitBtn.disabled = true;
          setStatus("Submitting...");

          try {
            const response = await fetch("/annotate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                image_id: images[idx],
                annotator_id: annotatorId,
                answers,
              }),
            });

            if (!response.ok) {
              const payload = await response.text();
              throw new Error(payload || `Submit failed: ${response.status}`);
            }

            idx += 1;
            clearForm();
            renderImage();

            if (idx >= images.length) {
              setStatus("All annotations submitted", "ok");
              return;
            }

            setStatus("Saved", "ok");
          } catch (error) {
            setStatus(error.message || "Submit failed", "error");
            submitBtn.disabled = false;
            return;
          }

          if (idx < images.length) submitBtn.disabled = false;
        });

        initializeApp();
      });
    })();
  </script>

  <!-- Login animation + bridge to app input -->
  <script>
    (() => {
      document.addEventListener("DOMContentLoaded", () => {
        try {
          const els = document.getElementById("els");
          const loginScreen = document.getElementById("login-screen");
          const loginInput = document.getElementById("loginAnnotatorId");
          const loginEnter = document.getElementById("loginEnter");
          const appInput = document.getElementById("annotatorId");
          const appEnterBtn = document.getElementById("enterBtn");
          const loginContent = document.getElementById("loginContent");
          const loginTitle = document.getElementById("loginTitle");
          const loginSubtitle = document.getElementById("loginSubtitle");
          const loginPanel = document.getElementById("loginPanel");

          if (!els || !loginScreen || !loginInput || !loginEnter || !appInput || !appEnterBtn || !loginContent || !loginTitle || !loginSubtitle || !loginPanel) {
            return;
          }

          const size = els.offsetWidth;
          const center = size / 2;

          function cluster(n, r1, r2, type) {
            for (let i = 0; i < n; i += 1) {
              const angle = Math.random() * Math.PI * 2;
              const r = r1 + Math.random() * (r2 - r1);

              const x = center + r * Math.cos(angle);
              const y = center + r * Math.sin(angle);

              const depthRand = Math.random();
              const depthClass = depthRand < 0.33 ? "depth-back" : depthRand < 0.66 ? "depth-mid" : "depth-front";

              const scale = depthClass === "depth-front" ? 1.15 : depthClass === "depth-mid" ? 0.9 : 0.7;

              const d = document.createElement("div");
              d.className = `cell ${type} ${depthClass}`;
              d.style.width = `${6 * scale}px`;
              d.style.height = `${6 * scale}px`;
              d.style.transform = `translate(${Math.random() * size}px,${Math.random() * size}px)`;

              els.appendChild(d);

              setTimeout(() => {
                d.style.transform = `translate(${x}px,${y}px) scale(${scale})`;
              }, 200);
            }
          }

          cluster(200, 0, size * 0.18, "b");
          cluster(260, size * 0.18, size * 0.32, "t");
          cluster(180, size * 0.32, size * 0.45, "k");

          setTimeout(() => {
            els.style.opacity = "0";
            els.style.transform = "translate(-50%,-50%) scale(1.08)";
          }, 3500);

          setTimeout(() => { loginContent.style.opacity = "1"; }, 4500);
          setTimeout(() => {
            loginTitle.style.opacity = "1";
            loginTitle.style.transform = "translateY(0)";
          }, 4800);

          setTimeout(() => {
            loginSubtitle.style.opacity = "1";
            loginSubtitle.style.transform = "translateY(0)";
          }, 5400);

          setTimeout(() => {
            loginPanel.style.opacity = "1";
            loginPanel.style.transform = "translateY(0)";
            loginInput.focus();
          }, 6000);

          function closeLoginScreen() {
            loginScreen.style.opacity = "0";
            setTimeout(() => { loginScreen.style.display = "none"; }, 500);
          }

          function submitLogin() {
            const id = loginInput.value.trim();
            if (!id) {
              loginInput.focus();
              return;
            }

            appInput.value = id;
            appEnterBtn.click();
            closeLoginScreen();
          }

          loginEnter.addEventListener("click", submitLogin);
          loginInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              submitLogin();
            }
          });
        } catch (error) {
          console.error("Login screen initialization failed:", error);
        }
      });
    })();
  </script>
</body>
</html>
