<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELSCAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --border: #d7dce5;
      --text: #1e2733;
      --subtle: #5b6878;
      --accent: #0f6bd8;
      --danger: #b42318;
      --ok: #05603a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #edf2ff 0%, var(--bg) 45%);
    }

    main {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 3px 10px rgba(20, 38, 66, 0.06);
    }

    .top-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary {
      background: #53627a;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      min-height: 18px;
      color: var(--subtle);
      font-size: 14px;
    }

    #status.error { color: var(--danger); }
    #status.ok { color: var(--ok); }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      background: #f1f4f9;
      border: 1px dashed #b8c3d4;
      border-radius: 10px;
      overflow: hidden;
    }

    #elsImage {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #imgCounter {
      margin-top: 10px;
      color: var(--subtle);
      font-size: 14px;
    }

    #questions {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 0;
      padding: 10px;
    }

    legend {
      font-weight: 700;
      padding: 0 6px;
      font-size: 14px;
    }

    .desc {
      margin: 0 0 8px;
      color: var(--subtle);
      font-size: 13px;
      white-space: pre-line;
    }

    .option {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin: 6px 0;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .top-row {
        grid-template-columns: 1fr;
      }
    }

    #login-screen {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 9999;
      transition: opacity 0.5s ease;
      background: #0b1020;
      background: radial-gradient(circle at 50% 30%, #1a1440 0%, #0b1020 65%);
      color: #fff;
      font-family: "Inter", sans-serif;
    }

    #login-screen .bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 70% 60%, rgba(255, 70, 120, 0.15), transparent 50%),
        radial-gradient(circle at 30% 40%, rgba(0, 255, 200, 0.12), transparent 50%);
    }

    #login-screen .els {
      position: absolute;
      width: min(60vh, 650px);
      height: min(60vh, 650px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    #login-screen .cell {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
      transition: transform 2.5s cubic-bezier(.16, .8, .24, 1);
    }

    #login-screen .depth-back { opacity: 0.4; }
    #login-screen .depth-mid { opacity: 0.75; }
    #login-screen .depth-front { opacity: 1; }

    #login-screen .b {
      background: radial-gradient(circle at 30% 30%, #fff6b5 0%, #ffd84d 60%, #b89d20 100%);
    }
    #login-screen .t {
      background: radial-gradient(circle at 30% 30%, #ffb5b5 0%, #ff4d4d 60%, #8f1f1f 100%);
    }
    #login-screen .k {
      background: radial-gradient(circle at 30% 30%, #b5ffd6 0%, #4dff88 60%, #1c8f4d 100%);
    }

    #login-screen .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #login-screen .title {
      font-size: clamp(64px, 7vw, 110px);
      font-weight: 900;
      letter-spacing: 0.18em;
      background: linear-gradient(90deg, #00f0ff, #ff4d4d, #ffd84d, #00f0ff);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientFlow 10s linear infinite;
      opacity: 0;
      transform: translateY(20px);
      transition: 1s ease;
    }

    @keyframes gradientFlow {
      0% { background-position: 0%; }
      100% { background-position: 300%; }
    }

    #login-screen .subtitle {
      font-family: "Playfair Display", serif;
      font-size: clamp(16px, 1.4vw, 20px);
      font-weight: 500;
      letter-spacing: 0.08em;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(15px);
      transition: 1s ease;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #login-screen .login {
      opacity: 0;
      transform: translateY(15px);
      transition: 1s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #login-screen .login input[type="text"] {
      width: 220px;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    #login-screen .login input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.75);
    }

    #login-screen .login button {
      padding: 14px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(45deg, #00f0ff, #ff4d4d);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      #login-screen .subtitle {
        white-space: normal;
        line-height: 1.4;
      }
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="bg"></div>
    <div class="els" id="els"></div>

    <div class="content" id="loginContent">
      <div class="title" id="loginTitle">ELSCAN</div>
      <div class="subtitle" id="loginSubtitle">Ectopic Lymphoid Structure Consensus Annotation Network</div>
      <div class="login" id="loginPanel">
        <input id="loginAnnotatorId" type="text" placeholder="Enter your name" />
        <button id="loginEnter" type="button">Enter</button>
      </div>
    </div>
  </div>

  <main>
    <h2>ELS Consensus Annotation</h2>

    <section class="card">
      <div class="top-row">
        <input id="annotatorId" type="text" placeholder="Annotator ID or Admin Token" />
        <button id="enterBtn" type="button">Enter</button>
        <button id="downloadBtn" class="secondary" type="button">Download CSV</button>
      </div>
      <div id="status" role="status"></div>
    </section>

    <section class="layout">
      <div class="card">
        <div class="image-wrap">
          <img id="elsImage" alt="ELS image" />
          <div id="emptyImageMsg">No image loaded</div>
        </div>
        <div id="imgCounter"></div>
      </div>

      <div class="card">
        <div id="questions"></div>
        <button id="submitBtn" type="button">Submit</button>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const els = document.getElementById("els");
      const loginScreen = document.getElementById("login-screen");
      const loginInput = document.getElementById("loginAnnotatorId");
      const loginEnter = document.getElementById("loginEnter");
      const appInput = document.getElementById("annotatorId");
      const appEnterBtn = document.getElementById("enterBtn");

      function createClusterAnimation() {
        const size = els.offsetWidth;
        if (!size) return;
        const center = size / 2;

        function cluster(n, r1, r2, type) {
          for (let i = 0; i < n; i += 1) {
            const angle = Math.random() * Math.PI * 2;
            const r = r1 + Math.random() * (r2 - r1);
            const x = center + r * Math.cos(angle);
            const y = center + r * Math.sin(angle);

            const depthRand = Math.random();
            const depthClass = depthRand < 0.33 ? "depth-back" : depthRand < 0.66 ? "depth-mid" : "depth-front";
            const scale = depthClass === "depth-front" ? 1.15 : depthClass === "depth-mid" ? 0.9 : 0.7;

            const cell = document.createElement("div");
            cell.className = `cell ${type} ${depthClass}`;
            cell.style.width = `${6 * scale}px`;
            cell.style.height = `${6 * scale}px`;
            cell.style.transform = `translate(${Math.random() * size}px,${Math.random() * size}px)`;
            els.appendChild(cell);

            setTimeout(() => {
              cell.style.transform = `translate(${x}px,${y}px) scale(${scale})`;
            }, 200);
          }
        }

        cluster(200, 0, size * 0.18, "b");
        cluster(260, size * 0.18, size * 0.32, "t");
        cluster(180, size * 0.32, size * 0.45, "k");

        setTimeout(() => {
          els.style.opacity = "0";
          els.style.transform = "translate(-50%,-50%) scale(1.08)";
        }, 3500);

        setTimeout(() => {
          document.getElementById("loginContent").style.opacity = "1";
        }, 4500);

        setTimeout(() => {
          const title = document.getElementById("loginTitle");
          title.style.opacity = "1";
          title.style.transform = "translateY(0)";
        }, 4800);

        setTimeout(() => {
          const subtitle = document.getElementById("loginSubtitle");
          subtitle.style.opacity = "1";
          subtitle.style.transform = "translateY(0)";
        }, 5400);

        setTimeout(() => {
          const panel = document.getElementById("loginPanel");
          panel.style.opacity = "1";
          panel.style.transform = "translateY(0)";
          loginInput.focus();
        }, 6000);
      }

      function submitLogin() {
        const id = loginInput.value.trim();
        if (!id) {
          loginInput.focus();
          return;
        }

        appInput.value = id;
        appEnterBtn.click();
        loginScreen.style.opacity = "0";
        setTimeout(() => {
          loginScreen.style.display = "none";
        }, 500);
      }

      loginEnter.addEventListener("click", submitLogin);
      loginInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitLogin();
        }
      });

      requestAnimationFrame(createClusterAnimation);
    });
  </script>
</body>
</html>
