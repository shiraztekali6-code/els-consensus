<script>
document.addEventListener("DOMContentLoaded", function () {

  const canvas = document.getElementById("elsCanvas");
  const ctx = canvas.getContext("2d");
  const loginCard = document.getElementById("loginCard");
  const loginScreen = document.getElementById("login-screen");

  let width, height;
  let cells = [];
  let startTime = null;
  const duration = 8000; // נשאר כמו שרצית

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  function randomPoint(radius) {
    const theta = Math.random() * Math.PI * 2;
    const r = Math.sqrt(Math.random()) * radius;
    return { x: r * Math.cos(theta), y: r * Math.sin(theta) };
  }

  function createCells() {
    cells = []; // בטיחותי
    const cx = width / 2;
    const cy = height / 2;
    const gcShift = randomPoint(20);

    for (let i = 0; i < 320; i++) {

      let type;
      if (i < 150) type = "B";
      else if (i < 280) type = "T";
      else type = "K";

      let target;

      if (type === "B") {
        target = randomPoint(80);
      }

      if (type === "T") {
        const inner = 60;
        const outer = 150;
        const theta = Math.random() * Math.PI * 2;
        const r = inner + Math.random() * (outer - inner);
        target = { x: r * Math.cos(theta), y: r * Math.sin(theta) };
      }

      if (type === "K") {
        const local = randomPoint(25);
        target = { x: gcShift.x + local.x, y: gcShift.y + local.y };
      }

      cells.push({
        type,
        x: Math.random() * width,
        y: Math.random() * height,
        targetX: cx + target.x,
        targetY: cy + target.y
      });
    }
  }

  function drawCell(c, progress) {

    // האצה קלה בהתכנסות
    c.x += (c.targetX - c.x) * 0.07;
    c.y += (c.targetY - c.y) * 0.07;

    ctx.beginPath();
    ctx.arc(c.x, c.y, 2.5, 0, Math.PI * 2);

    if (c.type === "B") ctx.fillStyle = "#FFD84D";
    if (c.type === "T") ctx.fillStyle = "#FF4D4D";

    if (c.type === "K") {
      const pulse = 1 + Math.sin(progress * 10) * 0.2;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 2.5 * pulse, 0, Math.PI * 2);
      ctx.fillStyle = "#39FF88";
    }

    ctx.fill();
  }

  function animate(timestamp) {

    if (!startTime) startTime = timestamp;

    const elapsed = timestamp - startTime;
    const progress = Math.min(elapsed / duration, 1);

    ctx.fillStyle = "#0b0f14";
    ctx.fillRect(0, 0, width, height);

    cells.forEach(c => drawCell(c, progress));

    // הכותרת עולה לפני סוף האנימציה
    if (progress > 0.85) {
      loginCard.style.opacity = 1;
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    }
  }

  if (!sessionStorage.getItem("elsIntroShown")) {
    createCells();
    requestAnimationFrame(animate);
    sessionStorage.setItem("elsIntroShown", "true");
  } else {
    ctx.fillStyle = "#0b0f14";
    ctx.fillRect(0, 0, width, height);
    loginCard.style.opacity = 1;
  }

  document.getElementById("loginEnter").addEventListener("click", function () {
    const id = document.getElementById("loginAnnotatorId").value.trim();
    if (!id) return;

    document.getElementById("annotatorId").value = id;
    document.getElementById("btnResume").click();
    loginScreen.style.display = "none";
  });

});
</script>
