<!doctype html>

<style>

/* ================= ORIGINAL APP STYLES (UNCHANGED) ================= */

<!-- LOGIN SCREEN -->

<div id="login-screen">
  <canvas id="elsCanvas"></canvas>

  <div class="login-wrapper">

<!-- MAIN APP -->

<div class="container">

<h1>ELS Consensus Annotation</h1>
<div class="subtitle">Blinded Human Structural Feature Encoding</div>

<div class="top-bar">
  <b>Annotator ID:</b>
  <input id="annotatorId" type="text">
  <button id="btnResume">Resume</button>
</div>

<div class="layout">
  <div class="image-panel">
    <img id="elsImage" alt="ELS image">
    <div id="imgCounter" style="margin-top:10px;"></div>
  </div>

    <div id="questions"></div>
    <button id="btnSubmit">Submit & Next</button>
  </div>
</div>

  <h3>Admin</h3>
  <input id="adminToken" type="password" placeholder="Admin token">
  <button onclick="downloadCSV()">Download all annotations (CSV)</button>
</div>

</div>

<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const canvas = document.getElementById("elsCanvas");
  const ctx = canvas.getContext("2d");
  const loginCard = document.getElementById("loginCard");
  const loginScreen = document.getElementById("login-screen");

  let width, height;
  let cells = [];
  let startTime = null;

  const buildDuration = 5000;
  const fadeDuration = 2000;
  let fadeStarted = false;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  function randomPoint(radius) {
    const theta = Math.random() * Math.PI * 2;
    const r = Math.sqrt(Math.random()) * radius;
    return { x: r * Math.cos(theta), y: r * Math.sin(theta) };
  }

  function createCells() {
    const cx = width / 2;
    const cy = height / 2;
    const totalCells = 950;
    const gcShift = randomPoint(25);

    for (let i = 0; i < totalCells; i++) {

      let type;
      if (i < totalCells * 0.45) type = "B";
      else if (i < totalCells * 0.85) type = "T";
      else type = "K";

      let target;
      if (type === "B") target = randomPoint(70);

      if (type === "T") {
        const inner = 50;
        const outer = 140;
        const theta = Math.random() * Math.PI * 2;
        const r = inner + Math.random() * (outer - inner);
        target = { x: r * Math.cos(theta), y: r * Math.sin(theta) };
      }

      if (type === "K") {
        const local = randomPoint(30);
        target = { x: gcShift.x + local.x, y: gcShift.y + local.y };
      }

      const depth = Math.random();

      cells.push({
        type,
        depth,
        size: 1.5 + depth * 2.2,
        alpha: 0.35 + depth * 0.65,
        x: Math.random() * width,
        y: Math.random() * height,
        targetX: cx + target.x,
        targetY: cy + target.y
      });
    }
  }

  function drawCell(c) {

    const speed = 0.03 + c.depth * 0.03;

    c.x += (c.targetX - c.x) * speed;
    c.y += (c.targetY - c.y) * speed;

    ctx.globalAlpha = c.alpha;

    ctx.shadowBlur = 8 + c.depth * 12;
    ctx.shadowColor =
      c.type === "B" ? "#FFD84D" :
      c.type === "T" ? "#FF4D4D" :
                       "#39FF88";

    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);

    if (c.type === "B") ctx.fillStyle = "#FFD84D";
    if (c.type === "T") ctx.fillStyle = "#FF4D4D";
    if (c.type === "K") ctx.fillStyle = "#39FF88";

    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  function animate(timestamp) {

    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;

    ctx.fillStyle = "#0b0f14";
    ctx.fillRect(0, 0, width, height);

    cells.forEach(drawCell);

    if (elapsed < buildDuration) {
      requestAnimationFrame(animate);
    }
    else if (elapsed < buildDuration + fadeDuration) {

      if (!fadeStarted) {
        fadeStarted = true;
        loginCard.style.opacity = 1;
      }

      const fadeProgress = (elapsed - buildDuration) / fadeDuration;
      canvas.style.opacity = 1 - fadeProgress;

      requestAnimationFrame(animate);
    }
    else {
      canvas.style.opacity = 0;
    }
  }

  createCells();
  requestAnimationFrame(animate);

  document.getElementById("loginEnter").addEventListener("click", function () {
    const id = document.getElementById("loginAnnotatorId").value.trim();
    if (!id) return;

    document.getElementById("annotatorId").value = id;
    loginScreen.style.display = "none";
  });

});
</script>

</body>
</html>
